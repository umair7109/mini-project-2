<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

h1{
    text-align: center;
    color: #ffffff;
    margin: 10px;
    
}

body {
    min-height: 100vh;
    padding: 25px;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* 🔘 Buttons Container */
.btns {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 25px;
}

/* 🟣 Category Buttons */
.btns button {
    padding: 10px 18px;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.btns button:hover {
    background: #fff;
    color: #4f46e5;
    transform: translateY(-3px);
}

/* 🧱 Product Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
}

/* 📦 Product Card (Glass Effect) */
.container div {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    color: #fff;
    transition: 0.3s ease;
    border: 1px solid rgba(255,255,255,0.2);
}

.container div:hover {
    transform: translateY(-6px) scale(1.02);
}

/* 🏷️ Product Name */
.container h1 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #ffffff;
    text-align: center;
}

/* 💰 Info */
.container p {
    font-size: 14px;
    margin: 4px 0;
    color: #e5e7eb;
}

/* 🛒 Button */
.container button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border: none;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.container button:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg, #16a34a, #15803d);
}
    </style>
</head>
<body>
    <h1>E comerce store</h1>
    <div class="btns">

    </div>
    <div class="container">

     
    

    </div>
    <script src="./app.js"></script>
</body>
</html>
